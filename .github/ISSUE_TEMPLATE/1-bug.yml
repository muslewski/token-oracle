name: Bug report
description: Something isn't working as expected
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in as much as you can so we can reproduce it.

        **Not a bug?** [Start a Discussion](https://github.com/muslewski/token-oracle/discussions) instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact commands you ran, in order.
      placeholder: |
        1. `token-oracle --version || oracle --version`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What did you see instead? Paste full error output if any.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `token-oracle --version || oracle --version` (or package version)
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime
      description: Node / Python version if relevant
      placeholder: "node v22 / python 3.12"

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15 / Ubuntu 24 / etc."
    validations:
      required: true
