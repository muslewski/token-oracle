name: Publish npm shim

# Publishes the Node npx/bunx wrapper from npm/ (Python stays on PyPI via publish.yml).
# Needs repo secret NPM_TOKEN (same automation token as agentic-sage).
on:
  push:
    tags:
      - 'v*'
      - 'token-oracle-v*'
    paths:
      - 'npm/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish npm shim with provenance
        working-directory: npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
