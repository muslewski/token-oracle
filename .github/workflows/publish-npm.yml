name: Publish npm package

# Canonical: ship-npm  OR  fleet workflow on muslewski/agentic-sage
# Manual-only — no tag trigger (avoids ENEEDAUTH without per-repo secret).
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Require NPM_TOKEN (prefer ship-npm / fleet)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::No NPM_TOKEN on this repo. Use ship-npm or:"
            echo "  gh workflow run 'Fleet npm publish' -R muslewski/agentic-sage"
            exit 1
          fi

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
