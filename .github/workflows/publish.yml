# Publish to PyPI.
#
# Trigger model:
#   - release-please opens the release PR, updates CHANGELOG, and pushes a "v*" tag when the PR
#     merges. HOWEVER, a tag pushed by release-please's default GITHUB_TOKEN will NOT trigger
#     this workflow (GitHub blocks same-actor re-triggering to prevent loops).
#   - To publish after release-please merges: a human pushes the tag manually
#     (`git pull --tags && git push origin vX.Y.Z`) which triggers the push:tags path below, OR
#     runs this workflow via the Actions UI (workflow_dispatch).
#   - release-please runs with RELEASE_PLEASE_TOKEN (repo secret, fine-grained PAT); tags it
#     pushes therefore trigger this workflow automatically. If the secret is absent or expired,
#     the fallback GITHUB_TOKEN applies and a human must push the tag manually
#     (`git pull --tags && git push origin vX.Y.Z`) or run this workflow via workflow_dispatch.
name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true
